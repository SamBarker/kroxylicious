# Proxy allocation: 2 CPU cores
# workerThreadCount pins Netty IO threads to 2×allocated rather than 2×node CPUs.
kroxylicious:
  resources:
    requests:
      cpu: "2000m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  network:
    proxy:
      workerThreadCount: 4
