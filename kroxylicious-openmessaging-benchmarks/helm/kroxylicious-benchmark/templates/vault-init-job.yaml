#
# Initialises the provisioned Vault instance:
#   1. Enables the transit secrets engine
#   2. Creates the KEK used by the encryption filter
#
# Runs after Vault is deployed and waits for it to be ready before proceeding.
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  labels:
    app: vault
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: vault-init
        image: {{ .Values.vault.image }}
        imagePullPolicy: {{ .Values.vault.imagePullPolicy }}
        env:
        - name: VAULT_ADDR
          value: "http://vault:8200"
        - name: VAULT_TOKEN
          value: {{ .Values.vault.token | quote }}
        command:
        - /bin/sh
        - -c
        - |
          set -e

          VAULT_URL="http://vault:8200"
          AUTH_HEADER="X-Vault-Token: ${VAULT_TOKEN}"

          echo "Waiting for Vault to be ready..."
          until wget -qO- "${VAULT_URL}/v1/sys/health" 2>/dev/null | grep -q '"sealed":false'; do
            echo "  Vault not ready yet, retrying in 2s..."
            sleep 2
          done
          echo "Vault is ready."

          echo "Enabling transit secrets engine..."
          if wget -qO- --header "${AUTH_HEADER}" "${VAULT_URL}/v1/sys/mounts" 2>/dev/null | grep -q '"transit/"'; then
            echo "  Transit engine already enabled."
          else
            wget -qO /dev/null --header "${AUTH_HEADER}" \
                --header "Content-Type: application/json" \
                --post-data '{"type":"transit"}' \
                "${VAULT_URL}/v1/sys/mounts/transit"
            echo "  Transit engine enabled."
          fi

          echo "Creating KEK '{{ .Values.encryption.kekName }}'..."
          if wget -qO- --header "${AUTH_HEADER}" \
              "${VAULT_URL}/v1/transit/keys/{{ .Values.encryption.kekName }}" 2>/dev/null | grep -q '"name"'; then
            echo "  KEK already exists."
          else
            wget -qO /dev/null --header "${AUTH_HEADER}" \
                --header "Content-Type: application/json" \
                --post-data '{}' \
                "${VAULT_URL}/v1/transit/keys/{{ .Values.encryption.kekName }}"
            echo "  KEK created."
          fi

          echo "Vault initialisation complete."
{{- end }}
